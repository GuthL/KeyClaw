name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  package:
    name: package (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
      - name: Derive release version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ -z "$version" ] || [ "$version" = "$GITHUB_REF_NAME" ]; then
            echo "expected tag in v{version} format, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          cargo_version="$(sed -n 's/^version = \"\\([^\"]*\\)\"$/\\1/p' Cargo.toml | head -n 1)"
          if [ "$cargo_version" != "$version" ]; then
            echo "Cargo.toml version ${cargo_version} does not match tag ${version}" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
      - name: cargo build --release --locked --target ${{ matrix.target }}
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package release archive
        shell: bash
        run: |
          scripts/package-release.sh \
            "${{ steps.version.outputs.value }}" \
            "${{ matrix.target }}" \
            "target/${{ matrix.target }}/release/keyclaw" \
            dist
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/keyclaw-v${{ steps.version.outputs.value }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish-draft:
    name: publish draft release
    runs-on: ubuntu-22.04
    needs: package
    steps:
      - uses: actions/checkout@v4
      - name: Derive release version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ -z "$version" ] || [ "$version" = "$GITHUB_REF_NAME" ]; then
            echo "expected tag in v{version} format, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          mapfile -t archives < <(find dist -maxdepth 1 -type f -name "keyclaw-v${{ steps.version.outputs.value }}-*.tar.gz" -printf '%f\n' | sort)
          if [ "${#archives[@]}" -ne 3 ]; then
            echo "expected 3 release archives, found ${#archives[@]}" >&2
            exit 1
          fi
          (
            cd dist
            sha256sum "${archives[@]}" > SHA256SUMS
          )
      - name: Verify release artifact contract
        shell: bash
        run: scripts/verify-release-contract.sh "${{ steps.version.outputs.value }}" dist
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          fail_on_unmatched_files: true
